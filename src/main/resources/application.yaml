spring:
  application:
    name: api-chat-ai

  ai:
    openai:
      api-key: ${GROQ_AI_API_KEY}
      base-url: ${GROQ_AI_URL}
      chat:
        options:
          model: ${GROQ_AI_MODEL}
          temperature: 0.5
      connection-timeout: 30s
      read-timeout: 60s
    chat:
      memory:
        repository:
          JDBC:
            initialize-schema: never # ou 'always'

# MYSQL Config
#  datasource:
#    url: jdbc:mysql://localhost:3306/mydatabase?useSSL=false&allowPublicKeyRetrieval=true
#    username: myuser
#    password: secret
#    driver-class-name: com.mysql.cj.jdbc.Driver

# Postgres Config
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# DEBUG
logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG